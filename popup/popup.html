<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>HTML Diff Marker</title>
<style>
  body { margin: 0; font-family: -apple-system, sans-serif; background: #f9fafb; color: #1f2937; width: 320px; }
  .header { padding: 14px 16px; background: linear-gradient(135deg, #3b82f6, #6366f1); color: white; }
  .header h1 { margin: 0; font-size: 15px; font-weight: 600; }
  .header p { margin: 4px 0 0; font-size: 11px; opacity: 0.9; }
  .body { padding: 14px 16px; }
  .status { background: #e5e7eb; border-radius: 6px; padding: 10px 12px; font-size: 12px; margin-bottom: 12px; }
  .status .row { display: flex; justify-content: space-between; margin: 3px 0; }
  .status .row span:last-child { font-weight: 600; color: #2563eb; }
  .btn { display: block; width: 100%; padding: 10px; margin-bottom: 8px; border: none; border-radius: 6px;
         cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.15s; }
  .btn-primary { background: #10b981; color: white; }
  .btn-primary:hover { background: #059669; }
  .btn-primary.active { background: #f59e0b; }
  .btn-secondary { background: #3b82f6; color: white; }
  .btn-secondary:hover { background: #2563eb; }
  .btn-ghost { background: #e5e7eb; color: #374151; }
  .btn-ghost:hover { background: #d1d5db; }
  .hint { font-size: 11px; color: #6b7280; line-height: 1.5; margin-top: 8px;
          padding-top: 10px; border-top: 1px solid #e5e7eb; }
  .hint code { background: #f3f4f6; padding: 1px 5px; border-radius: 3px; font-size: 10px; }
  .error-box { background: #fee2e2; color: #991b1b; padding: 8px 10px; border-radius: 6px;
               font-size: 12px; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="header">
  <h1>HTML Diff Marker</h1>
  <p>标记组件修改，生成 AI Agent 可用的 diff</p>
</div>
<div class="body">
  <div id="error"></div>
  <div class="status">
    <div class="row"><span>当前页面</span><span id="pStatus">检测中...</span></div>
    <div class="row"><span>标记组件</span><span id="pTotal">-</span></div>
    <div class="row"><span>已修改</span><span id="pModified">-</span></div>
    <div class="row"><span>选择模式</span><span id="pMode">-</span></div>
  </div>
  <button class="btn btn-primary" id="btnToggle">开始选择元素</button>
  <button class="btn btn-secondary" id="btnExport">生成 Diff 文件</button>
  <button class="btn btn-ghost" id="btnClear">清除所有标记</button>
  <div class="hint">
    <b>使用方法：</b><br/>
    1. 点击 <code>开始选择元素</code><br/>
    2. 在页面上点击要标记的组件<br/>
    3. 在底部面板中编辑修改后的 HTML<br/>
    4. 点击 <code>生成 Diff 文件</code> 导出<br/>
    按 <code>Esc</code> 可退出选择模式
  </div>
</div>
<script src="popup.js"></script>
</body>
</html>
