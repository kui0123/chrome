<!DOCTYPE html>

  </style>
</head>
<body>

<div style="display: flex; gap: 20px;">

<div class="console" id="console">初始化中...</div>

<script>
  // ============================================================
  // 核心修复函数：enforceSvgIconStyles
  // ============================================================
  function enforceSvgIconStyles(svgEl, options) {
    if (!svgEl || svgEl.tagName.toLowerCase() !== 'svg') return svgEl;
    
    options = options || {};
    var color = options.color || 'currentColor';
    var strokeWidth = options.strokeWidth || 2;
    var fill = options.fill || 'none';
    var size = options.size || null;
    
    // 修复 SVG 根元素
    svgEl.style.setProperty('display', 'block', 'important');
    if (size) {
      svgEl.style.setProperty('width', size, 'important');
      svgEl.style.setProperty('height', size, 'important');
    }
    
    // 遍历所有子元素，恢复几何属性和样式属性
    var children = svgEl.querySelectorAll('*');
    for (var i = 0; i < children.length; i++) {
      var el = children[i];
      var tag = el.tagName.toLowerCase();
      
      // 通用视觉属性
      el.style.setProperty('fill', fill, 'important');
      el.style.setProperty('stroke', color, 'important');
      el.style.setProperty('stroke-width', strokeWidth, 'important');
      el.style.setProperty('stroke-linecap', 'round', 'important');
      el.style.setProperty('stroke-linejoin', 'round', 'important');
      el.style.setProperty('display', 'block', 'important');
      
      // 按元素类型恢复几何属性
      switch (tag) {
        case 'circle':
          if (el.getAttribute('cx') !== null) {
            el.style.setProperty('cx', el.getAttribute('cx') + 'px', 'important');
          }
          if (el.getAttribute('cy') !== null) {
            el.style.setProperty('cy', el.getAttribute('cy') + 'px', 'important');
          }
          if (el.getAttribute('r') !== null) {
            el.style.setProperty('r', el.getAttribute('r') + 'px', 'important');
          }
          break;
          
        case 'ellipse':
          if (el.getAttribute('cx') !== null) {
            el.style.setProperty('cx', el.getAttribute('cx') + 'px', 'important');
          }
          if (el.getAttribute('cy') !== null) {
            el.style.setProperty('cy', el.getAttribute('cy') + 'px', 'important');
          }
          if (el.getAttribute('rx') !== null) {
            el.style.setProperty('rx', el.getAttribute('rx') + 'px', 'important');
          }
          if (el.getAttribute('ry') !== null) {
            el.style.setProperty('ry', el.getAttribute('ry') + 'px', 'important');
          }
          break;
          
        case 'rect':
          ['x', 'y', 'width', 'height', 'rx', 'ry'].forEach(function(attr) {
            if (el.getAttribute(attr) !== null) {
              el.style.setProperty(attr, el.getAttribute(attr) + 'px', 'important');
            }
          });
          break;
          
        case 'path':
          if (el.getAttribute('d') !== null) {
            el.style.setProperty('d', 'path("' + el.getAttribute('d') + '")', 'important');
          }
          break;
          
        case 'line':
          ['x1', 'y1', 'x2', 'y2'].forEach(function(attr) {
            if (el.getAttribute(attr) !== null) {
              el.style.setProperty(attr, el.getAttribute(attr) + 'px', 'important');
            }
          });
          break;
          
        case 'polyline':
        case 'polygon':
          if (el.getAttribute('points') !== null) {
            el.style.setProperty('points', el.getAttribute('points'), 'important');
          }
          break;
      }
    }
    
    return svgEl;
  }
  
  // 便捷函数：将 SVG HTML 字符串插入到容器中并修复样式
  function insertSvgIcon(container, svgHtml, options) {
    container.innerHTML = svgHtml;
    var svg = container.querySelector('svg');
    if (svg) {
      enforceSvgIconStyles(svg, options);
    }
    return svg;
  }
  
  // ============================================================
  // 测试图标集合
  // ============================================================
  const SVG_TEST_ICONS = {
    settings: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:24px;height:24px;"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
    reset: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:24px;height:24px;"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>',
    export: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:24px;height:24px;"><path d="M12 19V5"/><path d="m5 12 7-7 7 7"/></svg>',
    close: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:24px;height:24px;"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>',
    check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:24px;height:24px;"><path d="M20 6 9 17l-5-5"/></svg>',
    warning: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:24px;height:24px;"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>',
    trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:24px;height:24px;"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>',
    copy: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:24px;height:24px;"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',
  };
  
  // 工具栏用的小图标（14px）
  const TOOLBAR_ICONS = {
    settings: SVG_TEST_ICONS.settings.replace('width:24px;height:24px', 'width:14px;height:14px'),
    reset: SVG_TEST_ICONS.reset.replace('width:24px;height:24px', 'width:14px;height:14px'),
    export: SVG_TEST_ICONS.export.replace('width:24px;height:24px', 'width:14px;height:14px'),
    minus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;"><path d="M5 12h14"/></svg>',
    close: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>',
  };
  
  // ============================================================
  // 执行测试
  // ============================================================
  
  // 测试 1-4：单个图标对比
  // t0: 纯 SVG（基准）- 不需要修复
  // t1: all:unset 无修复
  // t2: CSS 恢复
  // t3: JS 内联修复（我们现在做）
  
  // 立即修复 t3
  (function() {
    const svg = document.getElementById('t3');
    enforceSvgIconStyles(svg, { color: '#1f2937', strokeWidth: 2, fill: 'none' });
  })();
  
  // 生成多图标测试
  const multiContainer = document.getElementById('multi-test');
  Object.keys(SVG_TEST_ICONS).forEach(name => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <h3>${name}</h3>
      <div class="icon-box" id="multi-${name}-box">
        ${SVG_TEST_ICONS[name]}
      </div>
      <div class="status" id="multi-${name}-status">修复中</div>
    `;
    multiContainer.appendChild(card);
    
    // 对每个图标应用 all:unset + JS 修复
    const box = document.getElementById(`multi-${name}-box`);
    box.style.setProperty('all', 'unset', 'important');
    box.style.setProperty('display', 'flex', 'important');
    box.style.setProperty('align-items', 'center', 'important');
    box.style.setProperty('justify-content', 'center', 'important');
    box.style.setProperty('width', '64px', 'important');
    box.style.setProperty('height', '64px', 'important');
    box.style.setProperty('border', '2px dashed #d1d5db', 'important');
    box.style.setProperty('border-radius', '8px', 'important');
    box.style.setProperty('background', '#fafafa', 'important');
    
    const svg = box.querySelector('svg');
    // 先确认 all:unset 破坏了它
    // 然后用 JS 修复
    enforceSvgIconStyles(svg, { color: '#1f2937', strokeWidth: 2, fill: 'none', size: '24px' });
  });
  
  // 完整工具栏模拟
  // CSS 方案（左）
  document.getElementById('tbc-reset').innerHTML = TOOLBAR_ICONS.reset;
  document.getElementById('tbc-settings').innerHTML = TOOLBAR_ICONS.settings;
  document.querySelector('#tbc-export .icon-slot').innerHTML = TOOLBAR_ICONS.export;
  document.getElementById('tbc-minus').innerHTML = TOOLBAR_ICONS.minus;
  document.getElementById('tbc-close').innerHTML = TOOLBAR_ICONS.close;
  
  // JS 方案（右）
  insertSvgIcon(document.getElementById('tbj-reset'), TOOLBAR_ICONS.reset, { color: '#6b7280', strokeWidth: 2, size: '14px' });
  insertSvgIcon(document.getElementById('tbj-settings'), TOOLBAR_ICONS.settings, { color: '#6b7280', strokeWidth: 2, size: '14px' });
  insertSvgIcon(document.querySelector('#tbj-export .icon-slot'), TOOLBAR_ICONS.export, { color: '#6b7280', strokeWidth: 2, size: '14px' });
  insertSvgIcon(document.getElementById('tbj-minus'), TOOLBAR_ICONS.minus, { color: 'white', strokeWidth: 2, size: '12px' });
  insertSvgIcon(document.getElementById('tbj-close'), TOOLBAR_ICONS.close, { color: 'white', strokeWidth: 2, size: '14px' });
  
  // ============================================================
  // 检测结果
  // ============================================================
  function checkVisible(svgEl) {
    if (!svgEl) return { visible: false, reason: 'no svg' };
    const circle = svgEl.querySelector('circle');
    const path = svgEl.querySelector('path');
    const target = circle || path;
    if (!target) return { visible: false, reason: 'no shape elements' };
    
    const cs = getComputedStyle(target);
    const hasStroke = cs.stroke !== 'none' && cs.stroke !== 'rgba(0, 0, 0, 0)';
    const hasWidth = parseFloat(cs.strokeWidth) > 0;
    
    // 检测几何属性
    let hasGeometry = false;
    const tag = target.tagName.toLowerCase();
    if (tag === 'circle') {
      const r = parseFloat(cs.r || '0');
      hasGeometry = r > 0;
    } else if (tag === 'path') {
      hasGeometry = cs.d !== 'none';
    } else if (tag === 'rect') {
      hasGeometry = parseFloat(cs.width || '0') > 0;
    }
    
    const visible = hasStroke && hasWidth && hasGeometry;
    return {
      visible,
      stroke: cs.stroke,
      strokeWidth: cs.strokeWidth,
      display: cs.display,
      r: cs.r,
      d: cs.d,
      hasGeometry
    };
  }
  
  function runChecks() {
    let out = '';
    
    // 基础对比
    out += '======== 基础对比测试 ========\n';
    [0, 1, 2, 3].forEach(i => {
      const svg = document.getElementById('t' + i);
      const result = checkVisible(svg);
      const label = ['基准', 'all:unset未修复', 'CSS恢复', 'JS内联修复'][i];
      const status = result.visible ? '<span class="good">✅ 可见</span>' : '<span class="bad">❌ 不可见</span>';
      out += `<span class="key">${label}</span>: ${status}\n`;
      out += `   stroke: ${result.stroke}, strokeWidth: ${result.strokeWidth}\n`;
      if (result.r !== undefined) out += `   r: ${result.r}\n`;
      if (result.d !== undefined) out += `   d: ${result.d ? '有路径' : 'none'}\n`;
      out += `   几何有效: ${result.hasGeometry ? 'YES' : 'NO'}\n\n`;
      
      const statusEl = document.getElementById('s' + i);
      if (i > 0 && statusEl) {
        statusEl.textContent = result.visible ? '✅ 可见' : '❌ 不可见';
        statusEl.className = 'status ' + (result.visible ? 'pass' : 'fail');
      }
    });
    
    // 多图标测试
    out += '======== 多图标验证（JS 修复方案） ========\n';
    let allPass = true;
    Object.keys(SVG_TEST_ICONS).forEach(name => {
      const box = document.getElementById(`multi-${name}-box`);
      const svg = box.querySelector('svg');
      const result = checkVisible(svg);
      const status = result.visible ? '<span class="good">✅</span>' : '<span class="bad">❌</span>';
      out += `${status} ${name}: ${result.visible ? '可见' : '不可见'}\n`;
      
      const statusEl = document.getElementById(`multi-${name}-status`);
      statusEl.textContent = result.visible ? '✅ 修复成功' : '❌ 修复失败';
      statusEl.className = 'status ' + (result.visible ? 'pass' : 'fail');
      
      if (!result.visible) allPass = false;
    });
    
    out += `\n<span class="${allPass ? 'good' : 'bad'}">多图标测试结果: ${allPass ? '全部通过' : '有失败项'}</span>\n`;
    
    document.getElementById('console').innerHTML = out;
  }
  
  setTimeout(runChecks, 300);
</script>

</body>
</html>
